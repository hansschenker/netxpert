packages:
  - "apps/*"
  - "docs"
  - "examples/*"
  - "packages/*"
  - "tooling/*"

allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

# Shared dependency versions — reference with "catalog:" in any package.json.
# Keeps RxJS / TypeScript / Vite identical across the whole workspace.
catalog:
  typescript: ^6.0.0
  vite: ^8.0.0
  rxjs: ^7.8.2
  turbo: ^2.9.0
  tsdown: ^0.22.0
  vitest: ^4.1.0
  wrangler: ^4.98.0
  "@biomejs/biome": ^2.4.0
  "@cloudflare/vite-plugin": ^1.40.0
  "@cloudflare/vitest-pool-workers": ^0.16.0
